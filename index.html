<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="An interactive map of the Proto-Indo-European language family tree." />
    <title>LangMap — Proto-Indo-European Language Family</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500&family=Noto+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div id="app">
      <div id="map-wrapper">
        <!-- SVG world map injected here by MapRenderer -->
      </div>

      <div id="timeline-bar" role="status" aria-live="polite" aria-label="Current language time period">
        <span id="timeline-year"></span>
      </div>

      <div id="info-panel" role="complementary" aria-label="Language information" aria-hidden="true">
        <!-- Populated by InfoPanel.js -->
      </div>

      <nav id="side-menu" role="navigation" aria-label="Language browser" aria-hidden="true">
        <!-- Populated by SideMenu.js -->
      </nav>

      <button
        id="menu-toggle"
        aria-label="Open language browser"
        aria-controls="side-menu"
        aria-expanded="false"
      >
        ☰
      </button>

      <button id="overview-toggle" aria-label="Toggle overview — show all language paths" aria-pressed="false">
        🗺
      </button>

      <button id="audio-toggle" aria-label="Toggle audio" aria-pressed="false">
        🔊
      </button>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
